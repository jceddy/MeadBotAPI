openapi: 3.0.3
info:
  title: MeadBotAPI
  description: >
    REST API for MeadBot's mead-brewing calculator functionality — a PHP port of the pure
    calculation functions exported by `CalculatorAPI.js` in the MeadBot Discord bot.


    All calculation endpoints return a JSON object with an `error` boolean. When `error` is
    `true`, the response also includes `errorMessage` and usually `errorArgument`,
    `errorArgumentPosition`, `errorType`, and `errorTypeLabel`, and the HTTP status is `400`.
    Calling an unregistered path returns `404`; calling a registered path with the wrong HTTP
    method returns `405` — both with the same `{error, errorMessage}` envelope.
  version: '1.0'
  license:
    name: GPL-3.0-only
    url: https://www.gnu.org/licenses/gpl-3.0.html
servers:
  - url: /api/v1
tags:
  - name: Gravity & ABV
  - name: Calories
  - name: Volume
  - name: Honey
  - name: Temperature
  - name: Blending
  - name: Nutrients
  - name: Sugar sources
  - name: Dates
  - name: Misc
  - name: Chat
  - name: Balance

paths:
  /health:
    get:
      tags: [Misc]
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: false
                  status:
                    type: string
                    example: ok

  /calories:
    post:
      tags: [Calories]
      summary: Estimate the caloric content of a beverage
      operationId: calculateCalories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [percentAlcohol, fg, bottleVolume, servingVolume]
              properties:
                percentAlcohol:
                  type: number
                  description: Percentage of alcohol by volume (e.g. `11.5` = 11.5% ABV). Range 0-100.
                  example: 12
                fg:
                  type: number
                  description: Final/specific gravity of the beverage. Range 0.99-1.2.
                  example: 1.0
                bottleVolume:
                  type: number
                  description: Milliliters in a bottle of the beverage. Range 100-5000.
                  example: 750
                servingVolume:
                  type: number
                  description: Milliliters in a serving of the beverage. Range 10-1000.
                  example: 150
      responses:
        '200':
          description: Calorie estimate.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      percentAlcohol: { type: number }
                      fg: { type: number }
                      alcoholGramsLiter: { type: number }
                      alcoholCalories: { type: number }
                      bottleVolume: { type: number }
                      servingVolume: { type: number }
                      residualSugar: { type: number }
                      residualCalories: { type: number }
                      totalCaloriesBottle: { type: number }
                      totalCalories250: { type: number }
                      totalCaloriesServing: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /abv:
    post:
      tags: [Gravity & ABV]
      summary: Calculate estimated %ABV from an original and final gravity
      description: >
        If `fg` is omitted, an estimated "dry" final gravity is used in its place.
      operationId: calculateABV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [og]
              properties:
                og:
                  type: number
                  description: Original gravity. Range 0.99-1.4.
                  example: 1.1
                fg:
                  type: number
                  nullable: true
                  description: Final gravity. Range 0.99-1.2. Omit to estimate a "dry" FG.
                  example: 1.0
      responses:
        '200':
          description: ABV estimate.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      og: { type: number }
                      fg: { type: number }
                      abv: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /gravity-drop-to-abv:
    post:
      tags: [Gravity & ABV]
      summary: Convert a gravity drop to a %ABV estimate
      operationId: convertGravityDropToABV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sgDelta]
              properties:
                sgDelta:
                  type: number
                  description: The gravity drop (e.g. OG - FG + 1).
                  example: 1.1
      responses:
        '200':
          description: ABV estimate.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      sgDelta: { type: number }
                      abv: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /dry-fg:
    post:
      tags: [Gravity & ABV]
      summary: Estimate the "dry" final gravity from an original gravity
      operationId: estimateDryFG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [og]
              properties:
                og:
                  type: number
                  example: 1.1
      responses:
        '200':
          description: Estimated dry FG.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      og: { type: number }
                      fg: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /volume-units:
    get:
      tags: [Volume]
      summary: List all recognized volume unit names
      description: >
        Lists the canonical (non-alias) name for each volume unit alongside its display name.
        /volume-units/{name} additionally accepts many alias spellings not listed here (e.g.
        `gal`, `gallon`, `gallons` all resolve to `gallons_us`).
      operationId: listVolumeUnits
      responses:
        '200':
          description: Volume units.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      volumeUnits:
                        type: array
                        items:
                          type: object
                          properties:
                            unit: { type: string, example: gallons_us }
                            name: { type: string, example: Gallon(s) US }

  /volume-units/{name}:
    get:
      tags: [Volume]
      summary: Look up a volume unit identifier by name
      operationId: getVolumeUnit
      parameters:
        - $ref: '#/components/parameters/UnitName'
      responses:
        '200':
          description: Unit found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      unitId: { type: integer }
        '400':
          $ref: '#/components/responses/Error'

  /volume/convert:
    post:
      tags: [Volume]
      summary: Convert a volume from one unit to another
      operationId: convertVolume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, fromUnit, toUnit]
              properties:
                amount: { type: number, example: 1 }
                fromUnit: { type: string, example: gallon }
                toUnit: { type: string, example: liters }
      responses:
        '200':
          description: Converted volume.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      fromAmount: { type: number }
                      fromUnit: { $ref: '#/components/schemas/UnitInfo' }
                      toAmount: { type: number }
                      toUnit: { $ref: '#/components/schemas/UnitInfo' }
        '400':
          $ref: '#/components/responses/Error'

  /honey-units/{name}:
    get:
      tags: [Honey]
      summary: Look up a honey unit identifier by name
      operationId: getHoneyUnit
      parameters:
        - $ref: '#/components/parameters/UnitName'
      responses:
        '200':
          description: Unit found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      unitId: { type: integer }
        '400':
          $ref: '#/components/responses/Error'

  /honey/convert:
    post:
      tags: [Honey]
      summary: Convert an amount of honey from one unit to another
      operationId: convertHoneyUnits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, fromUnit, toUnit]
              properties:
                amount: { type: number, example: 1 }
                fromUnit: { type: string, example: kg }
                toUnit: { type: string, example: lbs }
      responses:
        '200':
          description: Converted amount.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      fromAmount: { type: number }
                      fromUnit: { $ref: '#/components/schemas/UnitInfo' }
                      toAmount: { type: number }
                      toUnit: { $ref: '#/components/schemas/UnitInfo' }
        '400':
          $ref: '#/components/responses/Error'

  /temperature/convert:
    post:
      tags: [Temperature]
      summary: Convert a temperature between Celsius and Fahrenheit
      operationId: convertTemperature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fromTemperature, fromUnit]
              properties:
                fromTemperature: { type: number, example: 100 }
                fromUnit:
                  type: string
                  description: One of `c`, `celcius`, `f`, `fahrenheit`.
                  example: c
      responses:
        '200':
          description: Converted temperature.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      fromTemperature: { type: number }
                      fromUnit: { type: string }
                      toTemperature: { type: number }
                      toUnit: { type: string }
        '400':
          $ref: '#/components/responses/Error'

  /sg-to-brix:
    post:
      tags: [Gravity & ABV]
      summary: Convert a specific gravity to BRIX
      operationId: convertSGToBrix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sg]
              properties:
                sg: { type: number, example: 1.09 }
      responses:
        '200':
          description: BRIX value.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      sg: { type: number }
                      brix: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /delle:
    post:
      tags: [Gravity & ABV]
      summary: Compute an estimated Delle number
      operationId: computeDelle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [abv, sg]
              properties:
                abv: { type: number, example: 12.5 }
                sg: { type: number, example: 0.998 }
      responses:
        '200':
          description: Delle number.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      abv: { type: number }
                      sg: { type: number }
                      delle: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /potential-alcohol:
    post:
      tags: [Gravity & ABV]
      summary: Solve for whichever of og/fg/abv is implied by the other(s)
      description: >
        At least one of `og`, `fg`, `abv` must be supplied. Priority: if `og` and `abv` are both
        given, `fg` is solved; if only `og` is given (optionally with `fg`), `abv` is solved;
        otherwise `og` is solved from `fg` and `abv` (using a default for whichever of those two
        is also omitted). This mirrors the priority used by MeadBot's `!potential-alcohol`
        command. That command originally had two bugs this endpoint was built to avoid — not
        converting BRIX/BAUME inputs to SG in two of its three solve branches, and silently
        ignoring a specified og/abv that happened to equal its own default — both since fixed in
        MeadBot too. One difference remains: since this endpoint has no existing consumers, it
        uses a single consistent ABV↔SG formula for both solve-og and solve-fg, where MeadBot's
        command still uses a different approximation in each (see the MeadBot repo's
        `GravityCalculator.resolveGravityAbvTrio` for details).
      operationId: potentialAlcohol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gravityUnits:
                  type: string
                  enum: [sg, brix, baume]
                  default: sg
                abvUnits:
                  type: string
                  enum: [abv, abw]
                  default: abv
                og:
                  type: number
                  nullable: true
                  description: Original gravity, in gravityUnits.
                  example: 1.1
                fg:
                  type: number
                  nullable: true
                  description: Final gravity, in gravityUnits.
                abv:
                  type: number
                  nullable: true
                  description: Alcohol content, in abvUnits.
                  example: 14.0
      responses:
        '200':
          description: Resolved og/fg/abv trio.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      gravityUnits: { type: string }
                      abvUnits: { type: string }
                      og: { type: number }
                      fg: { type: number }
                      abv: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /calculate-blend:
    post:
      tags: [Blending]
      summary: Solve for one field of a two-liquid blend given the other four (or five)
      description: >
        Given any four of `{value1, value2, blendedValue, volume1, volume2, totalVolume}` (five
        for `total_volume` itself, which additionally accepts being solved from just
        `value1`/`value2`/`blendedValue` plus one of `volume1`/`volume2`), solves for
        `fieldToCalculate`. Fields not involved in the solve are returned as `null`.
      operationId: calculateBlend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fieldToCalculate]
              properties:
                fieldToCalculate:
                  type: string
                  enum: [value1, value2, blended_value, volume1, volume2, total_volume]
                value1:
                  type: number
                  nullable: true
                  description: The first liquid's value (gravity/ABV/etc — whatever is being blended).
                value2:
                  type: number
                  nullable: true
                  description: The second liquid's value.
                blendedValue:
                  type: number
                  nullable: true
                  description: The value after blending.
                volume1:
                  type: number
                  nullable: true
                  description: Volume of the liquid with value1.
                volume2:
                  type: number
                  nullable: true
                  description: Volume of the liquid with value2.
                totalVolume:
                  type: number
                  nullable: true
                  description: volume1 + volume2.
              example:
                fieldToCalculate: volume2
                value1: 11
                value2: 15
                blendedValue: 12
                volume1: 3
      responses:
        '200':
          description: Resolved blend fields.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      value1: { type: number, nullable: true }
                      value2: { type: number, nullable: true }
                      blendedValue: { type: number, nullable: true }
                      volume1: { type: number, nullable: true }
                      volume2: { type: number, nullable: true }
                      totalVolume: { type: number, nullable: true }
        '400':
          $ref: '#/components/responses/Error'

  /calculate-nutrients:
    post:
      tags: [Nutrients]
      summary: Compute a staggered-nutrient-addition (SNA) schedule for a target YAN
      description: >
        Splits a target YAN across Fermaid O, Fermaid K, and DAP (Blount-Elliott style, subject
        to per-source limits unless `enforceLimits` is false) and staggers the additions across
        a fixed schedule of 24/48/72 hours post-pitch plus the 1/3 sugar break. All parameters
        are optional; defaults match MeadBot's `!calculate-nutrients` command.
      operationId: calculateNutrients
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                units: { type: string, enum: [us, metric], default: us }
                volume:
                  type: number
                  description: Must volume, in gallons (us) or liters (metric). Defaults to 5 (us) or 18.9 (metric).
                yan: { type: number, default: 175, description: Target total YAN (ppm). }
                fermOEffectiveness: { type: number, default: 2.6 }
                enforceLimits: { type: boolean, default: true }
                dapLimit: { type: number, default: 0.96, description: g/L. }
                fermKLimit: { type: number, default: 0.5, description: g/L. }
                fermOLimit: { type: number, default: 0.45, description: g/L. }
                yanRatioDap: { type: number, default: 35, description: Used only when enforceLimits is false. }
                yanRatioFermK: { type: number, default: 25, description: Used only when enforceLimits is false. }
                yanRatioFermO: { type: number, default: 40, description: Used only when enforceLimits is false. }
                fermKYan: { type: number, default: 134, description: ppm YAN provided by the Fermaid K product in use. }
                fillFkFirst: { type: boolean, default: true }
                gofermYan: { type: number, default: 77, description: ppm YAN provided by the Go-Ferm product in use. }
                gofermGrams:
                  type: number
                  default: 0
                  description: Grams of Go-Ferm already used for rehydration; its YAN contribution is subtracted from yan.
      responses:
        '200':
          description: Nutrient schedule.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      yan: { type: number, description: Target YAN after subtracting the Go-Ferm contribution. }
                      volume: { type: number }
                      units: { type: integer }
                      foe: { type: number }
                      dap_limit: { type: number }
                      fermK_limit: { type: number }
                      fermO_limit: { type: number }
                      yan_ratio_dap: { type: number }
                      yan_ratio_fermK: { type: number }
                      yan_ratio_fermO: { type: number }
                      dapGL: { type: number }
                      fkGL: { type: number }
                      foGL: { type: number }
                      dapYan: { type: number }
                      fkYan: { type: number }
                      foYan: { type: number }
                      dapG: { type: number }
                      fkG: { type: number }
                      foG: { type: number }
                      enforce: { type: boolean }
                      debug: { type: string, description: Which internal solve branch was used. }
                      gofermYanContribution: { type: number }
                      sna:
                        type: object
                        properties:
                          nitrogen: { type: number }
                          totalFermO: { type: number }
                          totalFermK: { type: number }
                          totalDAP: { type: number }
                          additions:
                            type: array
                            items:
                              type: object
                              properties:
                                timing:
                                  description: An hour count, or the string "break" for the 1/3 sugar break.
                                  oneOf:
                                    - type: number
                                    - type: string
                                fermO: { type: number }
                                fermK: { type: number }
                                dap: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /build-batch:
    post:
      tags: [Nutrients]
      summary: Build a full recipe (honey, yeast, nutrients) for a target batch
      description: >
        Resolves a target OG/FG/ABV, picks an SNA schedule (or uses `snaScheduleOverride`),
        applies any fruit/grain YAN contribution, computes the honey weight and yeast/Go-Ferm
        requirements, and splits nutrients across whichever `nutrientRegimen` was selected. All
        parameters are optional; defaults match MeadBot's `!build-batch` command. `advanced*`,
        `yanRatio*`, `*Limit`, and `fillFkFirst` are only meaningful when `nutrientRegimen` is
        `advanced`.
      operationId: buildBatch
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                units: { type: string, enum: [us, metric], default: us }
                volume:
                  type: number
                  description: Batch volume, in gallons (us) or liters (metric). Defaults to 5 (us) or 18.9 (metric).
                yeastAbv: { type: number, default: 18, description: The yeast's expected %ABV tolerance. }
                residualSugar:
                  type: number
                  default: 1.02
                  description: Target FG. Ignored if ogOverride is set (re-derived from it instead).
                yanRequirement:
                  type: string
                  enum: [very_low, low, medium, high, kveik]
                  default: medium
                nutrientRegimen:
                  type: string
                  enum: [tosna, k_dap, blount_elliott, tosna_k, o_k, advanced]
                  default: blount_elliott
                ogOverride:
                  type: number
                  nullable: true
                  description: Target OG. If set, overrides residualSugar (re-deriving FG, clamped to a minimum of 1.0).
                pitchRateOverride:
                  type: number
                  nullable: true
                  description: Yeast g/gallon (us) or g/L (metric), overriding the normal Go-Ferm/pitch-rate calculation.
                fruitSg:
                  type: number
                  nullable: true
                  description: Gravity contribution from fruit/grains. Must not exceed the resolved OG.
                yanOverride:
                  type: number
                  nullable: true
                  description: Target total YAN (ppm). Used only for the advanced regimen.
                fermOEffectiveness: { type: number, default: 2.6 }
                enforceLimits: { type: boolean, default: true }
                dapLimit: { type: number, default: 0.96, description: g/L. }
                fermKLimit: { type: number, default: 0.5, description: g/L. }
                fermOLimit: { type: number, default: 0.45, description: g/L. }
                yanRatioDap: { type: number, default: 35 }
                yanRatioFermK: { type: number, default: 25 }
                yanRatioFermO: { type: number, default: 40 }
                fermKYan: { type: number, default: 134, description: ppm YAN provided by the Fermaid K product in use. }
                gofermYan: { type: number, default: 77, description: ppm YAN provided by the Go-Ferm product in use. }
                fillFkFirst: { type: boolean, default: true }
                hot:
                  type: boolean
                  default: false
                  description: Whether fermenting hot (affects the default SNA schedule).
                snaScheduleOverride:
                  type: array
                  nullable: true
                  description: >
                    Explicit SNA schedule, overriding the default derived from yanRequirement/hot/og.
                    Each element is an hour count (1-500), "break", or "pitch" (only as the first element).
                  items:
                    oneOf:
                      - type: number
                      - type: string
                  example: [24, 48, 72, 'break']
      responses:
        '200':
          description: Full recipe.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      volume: { type: number }
                      units: { type: integer }
                      og: { type: number }
                      fg: { type: number }
                      abv: { type: number }
                      yanRequirement: { type: integer }
                      nutrientRegimen: { type: integer }
                      gofermYanContribution: { type: number }
                      fruitPercent: { type: number }
                      fruitPercent100: { type: number }
                      fruitYanContribution: { type: number }
                      honey:
                        type: object
                        properties:
                          weight: { type: number }
                          unit: { type: string, example: lbs }
                      goferm:
                        type: object
                        properties:
                          minGrams: { type: number }
                          numPackets: { type: integer }
                          grams: { type: number }
                          dilutionWaterMl: { type: number }
                      nut:
                        type: object
                        description: The resolved nutrient schedule for the selected regimen.
                        properties:
                          nitrogen: { type: number }
                          totalFermO: { type: number }
                          totalFermK: { type: number }
                          totalDAP: { type: number }
                          additions:
                            type: array
                            items:
                              type: object
                              properties:
                                timing:
                                  oneOf:
                                    - type: number
                                    - type: string
                                fermO: { type: number }
                                fermK: { type: number }
                                dap: { type: number }
                      advancedNutrients:
                        type: object
                        nullable: true
                        description: Present only when nutrientRegimen is advanced; same shape as /calculate-nutrients' response.
                      break3:
                        type: number
                        description: The 1/3 sugar break gravity, used to label the corresponding addition.
        '400':
          $ref: '#/components/responses/Error'

  /calculate-mead:
    post:
      tags: [Nutrients]
      summary: Build a full recipe from a target gravity, volume, and/or ABV
      description: >
        Resolves a target OG/FG/ABV/volume — supply any two of target gravity, target volume, and
        target ABV, and the third is solved for; when both target gravity and target volume are
        given without a full sugar specification (or with one that leaves a sugar's amount
        unspecified), the required sugar quantity is solved for instead. Supports optional step
        feeding (`targetStepFeedGravity`), fruit/other-sugar YAN contribution via
        `additionalSugars`, and Go-Ferm/nutrient-schedule computation. All parameters are
        optional; defaults match MeadBot's `!calculate-mead` command. `additionalSugars` entries'
        `sugarContent`/`yanMultiplier` default to the named sugar source's known values when
        omitted.
      operationId: calculateMead
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                units: { type: string, enum: [us, metric, imperial], default: us }
                mustTemperature:
                  type: number
                  nullable: true
                  description: Defaults to 68 (us/imperial) or 20 (metric).
                mustTemperatureUnits:
                  type: string
                  enum: [celsius, fahrenheit]
                  nullable: true
                  description: Defaults to fahrenheit (us/imperial) or celsius (metric).
                targetGravity:
                  type: number
                  nullable: true
                  description: Defaults to 1.108 when neither targetVolume nor targetAbv resolve it.
                targetGravityUnits: { type: string, enum: [sg, brix, baume], nullable: true, default: sg }
                targetAbv:
                  type: number
                  nullable: true
                  description: Defaults to 14.13 when not resolved from targetGravity/targetStepFeedGravity.
                targetAbvUnits: { type: string, enum: [abv, abw], nullable: true, default: abv }
                targetVolume:
                  type: number
                  nullable: true
                  description: Defaults to 5 (us), 18.93 (metric), or 5 (imperial, in imperial gallons).
                targetVolumeUnits:
                  type: string
                  nullable: true
                  description: >
                    Defaults to gallons_us/liters/gallons_imp matching units. Any name accepted by
                    /volume-units/{name}.
                additionalSugars:
                  type: array
                  nullable: true
                  description: >
                    Additional fruit/sugar sources contributing to gravity and/or YAN. At most one
                    entry may omit quantityAmount (it will be solved for); entries with
                    additive=true must specify quantityAmount.
                  items:
                    type: object
                    required: [type, quantityUnits]
                    properties:
                      type:
                        type: string
                        example: honey
                        description: Sugar source name, e.g. honey, blueberry, dried_apricots.
                      quantityAmount:
                        type: number
                        nullable: true
                        description: Omit to have this sugar's quantity solved for.
                      quantityUnits:
                        type: string
                        example: lbs
                        description: Any name accepted by GET /honey-units/{name}.
                      sugarContent:
                        type: number
                        nullable: true
                        description: Percent sugar by weight. Defaults to the sugar source's known value.
                      yanMultiplier:
                        type: number
                        nullable: true
                        description: Defaults to the sugar source's known value.
                      additive:
                        type: boolean
                        default: false
                        description: If true, this sugar's volume is added on top of targetVolume rather than being part of it.
                currentGravity: { type: number, nullable: true, default: 1.0 }
                currentGravityUnits: { type: string, enum: [sg, brix, baume], nullable: true, default: sg }
                currentVolume: { type: number, nullable: true, default: 0 }
                currentVolumeUnits:
                  type: string
                  nullable: true
                  description: Defaults to gallons_us/liters/gallons_imp matching units.
                targetStepFeedGravity:
                  type: number
                  nullable: true
                  description: >
                    If set, must be greater than the resolved targetGravity; enables step feeding
                    and overrides targetAbv (derived from this value instead).
                yeastAbv: { type: number, default: 18, description: The yeast's expected %ABV tolerance. }
                yanRequirement:
                  type: string
                  enum: [very_low, low, medium, high, kveik]
                  default: medium
                hot:
                  type: boolean
                  default: false
                  description: Whether fermenting hot (affects the default SNA schedule).
                calculateAdditiveHoney:
                  type: boolean
                  default: false
                  description: >
                    When no additionalSugars are given and both targetGravity and targetVolume are
                    specified, solve for how much honey to add on top of targetVolume rather than
                    how much of targetVolume should be honey.
                fermOEffectiveness: { type: number, default: 2.6 }
                enforceLimits: { type: boolean, default: true }
                dapLimit: { type: number, default: 0.96, description: g/L. }
                fermKLimit: { type: number, default: 0.5, description: g/L. }
                fermOLimit: { type: number, default: 0.45, description: g/L. }
                yanRatioDap: { type: number, default: 35 }
                yanRatioFermK: { type: number, default: 25 }
                yanRatioFermO: { type: number, default: 40 }
                fermKYan: { type: number, default: 134, description: ppm YAN provided by the Fermaid K product in use. }
                gofermYan: { type: number, default: 77, description: ppm YAN provided by the Go-Ferm product in use. }
                fillFkFirst: { type: boolean, default: true }
                useGoferm: { type: boolean, default: true }
                yeastPackGrams: { type: number, default: 5 }
      responses:
        '200':
          description: Full recipe.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      mustTemperature: { type: number }
                      mustTemperatureUnits: { type: integer }
                      targetGravity: { type: number }
                      targetGravityUnits: { type: integer }
                      targetStepFeedGravity: { type: number, nullable: true }
                      targetFinalGravity:
                        type: number
                        description: The resolved FG, expressed in targetGravityUnits.
                      targetAbv: { type: number }
                      targetAbvUnits: { type: integer }
                      targetVolume: { type: number }
                      targetVolumeUnits: { type: integer }
                      stepFeeding:
                        type: object
                        nullable: true
                        description: Present only when targetStepFeedGravity was given.
                        properties:
                          volumeAfterSteps: { type: number }
                          honeyVolsPerStep: { type: number }
                          numberOfSteps: { type: integer }
                          stepAddSg: { type: number }
                      currentGravity: { type: number }
                      currentGravityUnits: { type: integer }
                      currentGravitySpecified: { type: boolean }
                      currentVolume: { type: number }
                      currentVolumeUnits: { type: integer }
                      currentVolumeSpecified: { type: boolean }
                      additionalSugars:
                        type: array
                        nullable: true
                        description: >
                          Echoes the request's additionalSugars, with any solved-for
                          quantityAmount filled in.
                        items:
                          type: object
                      goferm:
                        type: object
                        properties:
                          minGrams: { type: number }
                          numPackets: { type: integer }
                          grams: { type: number }
                          dilutionWaterMl: { type: number }
                          yeastPackGrams: { type: number }
                      gofermYanContribution: { type: number }
                      fruitYanContribution: { type: number }
                      nutrients:
                        type: object
                        description: Same shape as /calculate-nutrients' response (minus gofermYanContribution).
                      break3:
                        type: number
                        description: The 1/3 sugar break gravity, used to label the corresponding addition.
        '400':
          $ref: '#/components/responses/Error'

  /yeast-requirements:
    get:
      tags: [Nutrients]
      summary: List known yeasts and their YAN requirement
      operationId: listYeastRequirements
      responses:
        '200':
          description: Yeast YAN requirements.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      yeastRequirements:
                        type: array
                        items:
                          type: object
                          properties:
                            yeast: { type: string, example: Lalvin 71B }
                            requirement:
                              type: string
                              enum: [Very Low, Low, Medium, High, Kveik]

  /sugar-sources/{name}:
    get:
      tags: [Sugar sources]
      summary: Look up a sugar source identifier by name
      operationId: getSugarSourceIdentifier
      parameters:
        - name: name
          in: path
          required: true
          description: Sugar source name, e.g. `honey`, `blueberry`, `dried_apricots`.
          schema:
            type: string
          example: honey
      responses:
        '200':
          description: Sugar source found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      unitId: { type: integer }
                      sugarSource:
                        type: object
                        properties:
                          name: { type: string }
                          percent: { type: number }
                          yan: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /dates/days-between:
    post:
      tags: [Dates]
      summary: Calculate the number of full days between two dates
      operationId: getDaysBetween
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date1, date2]
              properties:
                date1: { type: string, format: date-time, example: '2024-01-01T00:00:00Z' }
                date2: { type: string, format: date-time, example: '2024-01-10T00:00:00Z' }
      responses:
        '200':
          description: Days between the two dates.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      daysBetween: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /dates/months-between:
    post:
      tags: [Dates]
      summary: Calculate the number of months between two dates
      operationId: getMonthsBetween
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date1, date2]
              properties:
                date1: { type: string, format: date-time, example: '2024-01-01T00:00:00Z' }
                date2: { type: string, format: date-time, example: '2024-03-15T00:00:00Z' }
                roundUpFractionalMonths:
                  type: boolean
                  default: false
                  description: If true, a fractional trailing month rounds up to a full month.
      responses:
        '200':
          description: Months between the two dates.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      monthsBetween: { type: integer }
        '400':
          $ref: '#/components/responses/Error'

  /random:
    get:
      tags: [Misc]
      summary: Generate a random integer in the range [0, max)
      operationId: randomInteger
      parameters:
        - name: max
          in: query
          required: true
          schema:
            type: integer
          example: 10
      responses:
        '200':
          description: Random integer.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      max: { type: integer }
                      value: { type: integer }
        '400':
          $ref: '#/components/responses/Error'

  /hours-string:
    post:
      tags: [Misc]
      summary: Build a human-readable string from SNA timing information
      operationId: makeHoursString
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [timing]
              properties:
                timing:
                  type: string
                  description: >
                    `"pitch"`, `"break"`, an `"hours,additionIndex"` pair (e.g. `"24,1"`), or a
                    plain number of hours (e.g. `"48"`).
                  example: '24,1'
                break3:
                  type: number
                  nullable: true
                  description: The 1/3 sugar break SG. Required only when `timing` is `"break"`.
      responses:
        '200':
          description: Human-readable timing string.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      timing: { type: string }
                      hoursString: { type: string }
        '400':
          $ref: '#/components/responses/Error'

  /chat:
    post:
      tags: [Chat]
      summary: Chat with an LLM agent that has every calculation/lookup endpoint, plus two MeadTools wiki tools, as tools
      description: >
        Runs one turn of a tool-calling chat loop against Fireworks AI (an OpenAI-compatible
        chat-completions API): sends `messages` plus tool definitions for every endpoint above
        except `/health` and `/random` (each executed locally, no HTTP round-trip — it calls the
        same code the corresponding REST route does) plus two tools for mead-making judgment
        calls that aren't pure calculations: `list_meadtools_wiki_pages`, which returns a
        hand-maintained index (title, url, level, category, a one-sentence summary, keywords,
        related_pages) of pages on wiki.meadtools.com so the model can pick a relevant one
        directly, and `fetch_meadtools_wiki_page`, which fetches a page from that same host (and
        can follow links to other pages on it) as an authoritative source. Feeds tool results
        back to the model and repeats until it replies with plain text. Requires the `X-Api-Key`
        header. Pass the returned `messages` array back in as the next request's `messages` (with
        a new user turn appended) to continue the conversation — this endpoint is stateless and
        keeps no server-side session.
      operationId: chat
      security:
        - ChatApiKey: []
      parameters:
        - name: X-User-Id
          in: header
          required: false
          description: >
            Optional caller-supplied identifier, recorded against this request's usage row for
            per-user reporting (see GET /balance/usage-by-user). Opaque to this endpoint — not
            validated against any user system, and never sent to Fireworks.
          schema:
            type: string
          example: alice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  description: >
                    OpenAI-style conversation so far, e.g. starting with a system message and the
                    user's latest message. Non-empty.
                  items:
                    type: object
                    properties:
                      role: { type: string, enum: [system, user, assistant, tool] }
                      content: { type: string, nullable: true }
                model:
                  type: string
                  enum: [gpt, ds]
                  default: ds
                  description: >
                    Which Fireworks-hosted model to run this turn against — `ds` for
                    DeepSeek-V4-Flash (the default) or `gpt` for gpt-oss-120b. See
                    MeadBotApi\Chat\ModelCatalog for each model's Fireworks model id and the
                    per-1M-token pricing `costUsd` is computed from. A 400 error is returned if
                    this is present but not one of the two keys above.
              example:
                messages:
                  - role: user
                    content: I have 5 gallons at 1.100 SG. What's my potential ABV?
      responses:
        '200':
          description: Assistant reply, plus the full updated conversation and token usage/cost.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      reply:
                        type: string
                        description: The final assistant message's text content.
                      messages:
                        type: array
                        description: >
                          The input messages plus every assistant/tool turn generated this
                          request — pass this back as the next request's `messages`.
                        items:
                          type: object
                      usage:
                        $ref: '#/components/schemas/ChatUsage'
                      costUsd:
                        type: number
                        description: >
                          Estimated USD cost of `usage`, from the requested `model`'s pricing in
                          MeadBotApi\Chat\ModelCatalog. Not billing-authoritative — Fireworks' own
                          usage dashboard is.
        '400':
          description: >
            Missing/invalid request, missing/invalid `X-Api-Key`, chat not configured on this
            server (no `FIREWORKS_API_KEY`/`CHAT_API_KEY`), or a Fireworks API/network failure.
            `usage`/`costUsd` are included even here whenever at least one underlying Fireworks
            call completed before the failure (e.g. a later tool-call round failed, or the
            iteration cap was hit) — those calls were still billed by Fireworks.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      insufficientBalance:
                        type: boolean
                        description: >
                          True when the failure was Fireworks responding with HTTP 402 (the
                          account's prepaid balance is exhausted) — see POST /balance/deposits to
                          top it up. Absent/false for every other kind of failure.
                      exceededToolIterations:
                        type: boolean
                        description: >
                          True when the failure was the chat agent hitting its tool-calling
                          iteration cap without producing a final reply. Absent/false for every
                          other kind of failure.
                      usage:
                        $ref: '#/components/schemas/ChatUsage'
                      costUsd:
                        type: number

  /chat/feedback:
    post:
      tags: [Chat]
      summary: Record negative feedback on a !chat reply (a Discord 👎 reaction)
      description: >
        Inserts one row into the chat feedback table. Intended to be called by MeadBot's
        messageReactionAdd handler once it's confirmed the reacted-to message really was a
        `!chat`/`!ask` reply, passing the reconstructed conversation ending with the disliked
        assistant reply. Requires the `X-Api-Key` header. Purely a feedback log — this endpoint
        doesn't affect `/chat`'s behavior in any way.
      operationId: recordChatFeedback
      security:
        - ChatApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [discordUserId, discordMessageId, messages]
              properties:
                discordUserId:
                  type: string
                  description: Snowflake ID of the Discord user who reacted 👎.
                  example: '123456789012345678'
                discordMessageId:
                  type: string
                  description: Snowflake ID of MeadBot's message that got the reaction.
                  example: '234567890123456789'
                discordChannelId:
                  type: string
                  nullable: true
                  example: '345678901234567890'
                discordGuildId:
                  type: string
                  nullable: true
                  description: Omitted/null for a reaction in a DM channel.
                  example: '456789012345678901'
                messages:
                  type: array
                  description: >
                    OpenAI-style conversation ending with the disliked assistant reply. Non-empty.
                  items:
                    type: object
                    properties:
                      role: { type: string, enum: [system, user, assistant, tool] }
                      content: { type: string, nullable: true }
      responses:
        '200':
          description: Feedback recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessFlag'
        '400':
          description: >
            Missing `discordUserId`/`discordMessageId`/`messages`, missing/invalid `X-Api-Key`,
            or the feedback database isn't configured/reachable on this server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /balance:
    get:
      tags: [Balance]
      summary: The running prepaid balance (total deposits minus total chat usage cost)
      description: >
        Always recomputed as SUM(deposits) - SUM(usage cost) from the database — never a stored,
        cacheable figure — so it can't drift out of sync. Purely informational: /api/v1/chat never
        checks this before running, so it can't be used to enforce a hard spending cap. Requires
        the `X-Api-Key` header.
      operationId: getBalance
      security:
        - ChatApiKey: []
      responses:
        '200':
          description: Current balance.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      balance:
                        $ref: '#/components/schemas/Balance'
        '400':
          description: >
            Missing/invalid `X-Api-Key`, or the balance database isn't configured
            (`MYSQL_DB_HOST`/`MYSQL_DB_DATABASE`/`MYSQL_DB_USERNAME`/`MYSQL_DB_PASSWORD`) or
            reachable on this server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /balance/usage-by-user:
    get:
      tags: [Balance]
      summary: Per-user chat usage totals, ordered by total cost descending
      description: >
        One row per distinct `X-User-Id` value seen on POST /chat requests (a `userId` of `null`
        groups every request that omitted the header), including failed requests (which may have
        zero usage/cost). Requires the `X-Api-Key` header.
      operationId: getUsageByUser
      security:
        - ChatApiKey: []
      responses:
        '200':
          description: Per-user usage totals.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      usageByUser:
                        type: array
                        items:
                          type: object
                          properties:
                            userId:
                              type: string
                              nullable: true
                              description: The X-User-Id header value, or null for requests that omitted it.
                            requestCount:
                              type: integer
                            totalUsageUsd:
                              type: number
                            totalTokens:
                              type: integer
                            lastUsedAt:
                              type: string
                              description: Timestamp of this user's most recent request.
        '400':
          description: >
            Missing/invalid `X-Api-Key`, or the balance database isn't configured/reachable on
            this server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /balance/deposits:
    post:
      tags: [Balance]
      summary: Record a prepaid-balance deposit (e.g. after topping up the Fireworks account)
      description: >
        Inserts one row into the deposits ledger and returns the updated balance. `amountUsd` may
        be negative for a manual correction (e.g. reconciling against Fireworks' own billing
        dashboard) — there's no separate adjustments concept, just deposits that happen to be
        negative. Requires the `X-Api-Key` header.
      operationId: recordBalanceDeposit
      security:
        - ChatApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountUsd]
              properties:
                amountUsd:
                  type: number
                  example: 50
                note:
                  type: string
                  nullable: true
                  example: Fireworks top-up 2026-07-19
      responses:
        '200':
          description: Deposit recorded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      deposit:
                        type: object
                        properties:
                          amountUsd: { type: number }
                          note: { type: string, nullable: true }
                      balance:
                        $ref: '#/components/schemas/Balance'
        '400':
          description: >
            Missing/invalid `amountUsd`, missing/invalid `X-Api-Key`, or the balance database
            isn't configured/reachable on this server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    ChatApiKey:
      type: apiKey
      in: header
      name: X-Api-Key
      description: Shared secret configured server-side as CHAT_API_KEY. Required only for POST /chat.

  parameters:
    UnitName:
      name: name
      in: path
      required: true
      description: Unit name, e.g. `gallon`, `liters`, `kg`, `lbs`.
      schema:
        type: string
      example: gallon

  schemas:
    SuccessFlag:
      type: object
      properties:
        error:
          type: boolean
          example: false

    UnitInfo:
      type: object
      properties:
        name:
          type: string
          example: Gallon(s) US
        conversion:
          type: number
          description: Multiplier to convert an amount in this unit to the module's base unit.
          example: 3.7854117891

    ChatUsage:
      type: object
      description: >
        Total token usage across every Fireworks call the request made — a single /chat request
        can trigger several (one per tool-calling round), so these are already summed.
      properties:
        prompt_tokens:
          type: integer
          description: Total input tokens (cached + uncached combined).
        cached_prompt_tokens:
          type: integer
          description: The subset of prompt_tokens that hit Fireworks' prompt cache (billed at a lower rate).
        completion_tokens:
          type: integer
        total_tokens:
          type: integer

    Balance:
      type: object
      properties:
        totalDepositsUsd:
          type: number
          description: Sum of every recorded deposit (POST /balance/deposits).
        totalUsageUsd:
          type: number
          description: Sum of every /chat request's costUsd.
        balanceUsd:
          type: number
          description: totalDepositsUsd - totalUsageUsd.

    Error:
      type: object
      properties:
        error:
          type: boolean
          example: true
        errorMessage:
          type: string
          example: 'og nope is not a number.'
        errorArgument:
          type: string
          nullable: true
          example: og
        errorArgumentPosition:
          type: integer
          nullable: true
          example: 0
        errorType:
          type: integer
          nullable: true
          description: '0 = unknown, 1 = isNaN, 2 = range, 3 = invalid arguments.'
          example: 1
        errorTypeLabel:
          type: string
          nullable: true
          example: isNaN

  responses:
    Error:
      description: The request could not be processed (validation failure, out-of-range value, or unknown unit/name).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
