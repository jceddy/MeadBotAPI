openapi: 3.0.3
info:
  title: MeadBotAPI
  description: >
    REST API for MeadBot's mead-brewing calculator functionality — a PHP port of the pure
    calculation functions exported by `CalculatorAPI.js` in the MeadBot Discord bot.


    All calculation endpoints return a JSON object with an `error` boolean. When `error` is
    `true`, the response also includes `errorMessage` and usually `errorArgument`,
    `errorArgumentPosition`, `errorType`, and `errorTypeLabel`, and the HTTP status is `400`.
    Calling an unregistered path returns `404`; calling a registered path with the wrong HTTP
    method returns `405` — both with the same `{error, errorMessage}` envelope.
  version: '1.0'
  license:
    name: GPL-3.0-only
    url: https://www.gnu.org/licenses/gpl-3.0.html
servers:
  - url: /api/v1
tags:
  - name: Gravity & ABV
  - name: Calories
  - name: Volume
  - name: Honey
  - name: Temperature
  - name: Blending
  - name: Nutrients
  - name: Sugar sources
  - name: Dates
  - name: Misc

paths:
  /health:
    get:
      tags: [Misc]
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: false
                  status:
                    type: string
                    example: ok

  /calories:
    post:
      tags: [Calories]
      summary: Estimate the caloric content of a beverage
      operationId: calculateCalories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [percentAlcohol, fg, bottleVolume, servingVolume]
              properties:
                percentAlcohol:
                  type: number
                  description: Percentage of alcohol by volume (e.g. `11.5` = 11.5% ABV). Range 0-100.
                  example: 12
                fg:
                  type: number
                  description: Final/specific gravity of the beverage. Range 0.99-1.2.
                  example: 1.0
                bottleVolume:
                  type: number
                  description: Milliliters in a bottle of the beverage. Range 100-5000.
                  example: 750
                servingVolume:
                  type: number
                  description: Milliliters in a serving of the beverage. Range 10-1000.
                  example: 150
      responses:
        '200':
          description: Calorie estimate.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      percentAlcohol: { type: number }
                      fg: { type: number }
                      alcoholGramsLiter: { type: number }
                      alcoholCalories: { type: number }
                      bottleVolume: { type: number }
                      servingVolume: { type: number }
                      residualSugar: { type: number }
                      residualCalories: { type: number }
                      totalCaloriesBottle: { type: number }
                      totalCalories250: { type: number }
                      totalCaloriesServing: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /abv:
    post:
      tags: [Gravity & ABV]
      summary: Calculate estimated %ABV from an original and final gravity
      description: >
        If `fg` is omitted, an estimated "dry" final gravity is used in its place.
      operationId: calculateABV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [og]
              properties:
                og:
                  type: number
                  description: Original gravity. Range 0.99-1.4.
                  example: 1.1
                fg:
                  type: number
                  nullable: true
                  description: Final gravity. Range 0.99-1.2. Omit to estimate a "dry" FG.
                  example: 1.0
      responses:
        '200':
          description: ABV estimate.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      og: { type: number }
                      fg: { type: number }
                      abv: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /gravity-drop-to-abv:
    post:
      tags: [Gravity & ABV]
      summary: Convert a gravity drop to a %ABV estimate
      operationId: convertGravityDropToABV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sgDelta]
              properties:
                sgDelta:
                  type: number
                  description: The gravity drop (e.g. OG - FG + 1).
                  example: 1.1
      responses:
        '200':
          description: ABV estimate.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      sgDelta: { type: number }
                      abv: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /dry-fg:
    post:
      tags: [Gravity & ABV]
      summary: Estimate the "dry" final gravity from an original gravity
      operationId: estimateDryFG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [og]
              properties:
                og:
                  type: number
                  example: 1.1
      responses:
        '200':
          description: Estimated dry FG.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      og: { type: number }
                      fg: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /volume-units/{name}:
    get:
      tags: [Volume]
      summary: Look up a volume unit identifier by name
      operationId: getVolumeUnit
      parameters:
        - $ref: '#/components/parameters/UnitName'
      responses:
        '200':
          description: Unit found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      unitId: { type: integer }
        '400':
          $ref: '#/components/responses/Error'

  /volume/convert:
    post:
      tags: [Volume]
      summary: Convert a volume from one unit to another
      operationId: convertVolume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, fromUnit, toUnit]
              properties:
                amount: { type: number, example: 1 }
                fromUnit: { type: string, example: gallon }
                toUnit: { type: string, example: liters }
      responses:
        '200':
          description: Converted volume.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      fromAmount: { type: number }
                      fromUnit: { $ref: '#/components/schemas/UnitInfo' }
                      toAmount: { type: number }
                      toUnit: { $ref: '#/components/schemas/UnitInfo' }
        '400':
          $ref: '#/components/responses/Error'

  /honey-units/{name}:
    get:
      tags: [Honey]
      summary: Look up a honey unit identifier by name
      operationId: getHoneyUnit
      parameters:
        - $ref: '#/components/parameters/UnitName'
      responses:
        '200':
          description: Unit found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      unitId: { type: integer }
        '400':
          $ref: '#/components/responses/Error'

  /honey/convert:
    post:
      tags: [Honey]
      summary: Convert an amount of honey from one unit to another
      operationId: convertHoneyUnits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, fromUnit, toUnit]
              properties:
                amount: { type: number, example: 1 }
                fromUnit: { type: string, example: kg }
                toUnit: { type: string, example: lbs }
      responses:
        '200':
          description: Converted amount.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      fromAmount: { type: number }
                      fromUnit: { $ref: '#/components/schemas/UnitInfo' }
                      toAmount: { type: number }
                      toUnit: { $ref: '#/components/schemas/UnitInfo' }
        '400':
          $ref: '#/components/responses/Error'

  /temperature/convert:
    post:
      tags: [Temperature]
      summary: Convert a temperature between Celsius and Fahrenheit
      operationId: convertTemperature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fromTemperature, fromUnit]
              properties:
                fromTemperature: { type: number, example: 100 }
                fromUnit:
                  type: string
                  description: One of `c`, `celcius`, `f`, `fahrenheit`.
                  example: c
      responses:
        '200':
          description: Converted temperature.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      fromTemperature: { type: number }
                      fromUnit: { type: string }
                      toTemperature: { type: number }
                      toUnit: { type: string }
        '400':
          $ref: '#/components/responses/Error'

  /sg-to-brix:
    post:
      tags: [Gravity & ABV]
      summary: Convert a specific gravity to BRIX
      operationId: convertSGToBrix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sg]
              properties:
                sg: { type: number, example: 1.09 }
      responses:
        '200':
          description: BRIX value.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      sg: { type: number }
                      brix: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /delle:
    post:
      tags: [Gravity & ABV]
      summary: Compute an estimated Delle number
      operationId: computeDelle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [abv, sg]
              properties:
                abv: { type: number, example: 12.5 }
                sg: { type: number, example: 0.998 }
      responses:
        '200':
          description: Delle number.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      abv: { type: number }
                      sg: { type: number }
                      delle: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /potential-alcohol:
    post:
      tags: [Gravity & ABV]
      summary: Solve for whichever of og/fg/abv is implied by the other(s)
      description: >
        At least one of `og`, `fg`, `abv` must be supplied. Priority: if `og` and `abv` are both
        given, `fg` is solved; if only `og` is given (optionally with `fg`), `abv` is solved;
        otherwise `og` is solved from `fg` and `abv` (using a default for whichever of those two
        is also omitted). This mirrors the priority used by MeadBot's `!potential-alcohol`
        command, but — since this is new API surface with no existing consumers — always
        converts BRIX/BAUME inputs to SG before computing and uses a single consistent ABV↔SG
        formula throughout, correcting two bugs present in that command (see the MeadBot repo's
        `GravityCalculator.resolveGravityAbvTrio` for details on those bugs, preserved there for
        backward compatibility with the live Discord command).
      operationId: potentialAlcohol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gravityUnits:
                  type: string
                  enum: [sg, brix, baume]
                  default: sg
                abvUnits:
                  type: string
                  enum: [abv, abw]
                  default: abv
                og:
                  type: number
                  nullable: true
                  description: Original gravity, in gravityUnits.
                  example: 1.1
                fg:
                  type: number
                  nullable: true
                  description: Final gravity, in gravityUnits.
                abv:
                  type: number
                  nullable: true
                  description: Alcohol content, in abvUnits.
                  example: 14.0
      responses:
        '200':
          description: Resolved og/fg/abv trio.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      gravityUnits: { type: string }
                      abvUnits: { type: string }
                      og: { type: number }
                      fg: { type: number }
                      abv: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /calculate-blend:
    post:
      tags: [Blending]
      summary: Solve for one field of a two-liquid blend given the other four (or five)
      description: >
        Given any four of `{value1, value2, blendedValue, volume1, volume2, totalVolume}` (five
        for `total_volume` itself, which additionally accepts being solved from just
        `value1`/`value2`/`blendedValue` plus one of `volume1`/`volume2`), solves for
        `fieldToCalculate`. Fields not involved in the solve are returned as `null`.
      operationId: calculateBlend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fieldToCalculate]
              properties:
                fieldToCalculate:
                  type: string
                  enum: [value1, value2, blended_value, volume1, volume2, total_volume]
                value1:
                  type: number
                  nullable: true
                  description: The first liquid's value (gravity/ABV/etc — whatever is being blended).
                value2:
                  type: number
                  nullable: true
                  description: The second liquid's value.
                blendedValue:
                  type: number
                  nullable: true
                  description: The value after blending.
                volume1:
                  type: number
                  nullable: true
                  description: Volume of the liquid with value1.
                volume2:
                  type: number
                  nullable: true
                  description: Volume of the liquid with value2.
                totalVolume:
                  type: number
                  nullable: true
                  description: volume1 + volume2.
              example:
                fieldToCalculate: volume2
                value1: 11
                value2: 15
                blendedValue: 12
                volume1: 3
      responses:
        '200':
          description: Resolved blend fields.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      value1: { type: number, nullable: true }
                      value2: { type: number, nullable: true }
                      blendedValue: { type: number, nullable: true }
                      volume1: { type: number, nullable: true }
                      volume2: { type: number, nullable: true }
                      totalVolume: { type: number, nullable: true }
        '400':
          $ref: '#/components/responses/Error'

  /calculate-nutrients:
    post:
      tags: [Nutrients]
      summary: Compute a staggered-nutrient-addition (SNA) schedule for a target YAN
      description: >
        Splits a target YAN across Fermaid O, Fermaid K, and DAP (Blount-Elliott style, subject
        to per-source limits unless `enforceLimits` is false) and staggers the additions across
        a fixed schedule of 24/48/72 hours post-pitch plus the 1/3 sugar break. All parameters
        are optional; defaults match MeadBot's `!calculate-nutrients` command.
      operationId: calculateNutrients
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                units: { type: string, enum: [us, metric], default: us }
                volume:
                  type: number
                  description: Must volume, in gallons (us) or liters (metric). Defaults to 5 (us) or 18.9 (metric).
                yan: { type: number, default: 175, description: Target total YAN (ppm). }
                fermOEffectiveness: { type: number, default: 2.6 }
                enforceLimits: { type: boolean, default: true }
                dapLimit: { type: number, default: 0.96, description: g/L. }
                fermKLimit: { type: number, default: 0.5, description: g/L. }
                fermOLimit: { type: number, default: 0.45, description: g/L. }
                yanRatioDap: { type: number, default: 35, description: Used only when enforceLimits is false. }
                yanRatioFermK: { type: number, default: 25, description: Used only when enforceLimits is false. }
                yanRatioFermO: { type: number, default: 40, description: Used only when enforceLimits is false. }
                fermKYan: { type: number, default: 134, description: ppm YAN provided by the Fermaid K product in use. }
                fillFkFirst: { type: boolean, default: true }
                gofermYan: { type: number, default: 77, description: ppm YAN provided by the Go-Ferm product in use. }
                gofermGrams:
                  type: number
                  default: 0
                  description: Grams of Go-Ferm already used for rehydration; its YAN contribution is subtracted from yan.
      responses:
        '200':
          description: Nutrient schedule.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      yan: { type: number, description: Target YAN after subtracting the Go-Ferm contribution. }
                      volume: { type: number }
                      units: { type: integer }
                      foe: { type: number }
                      dap_limit: { type: number }
                      fermK_limit: { type: number }
                      fermO_limit: { type: number }
                      yan_ratio_dap: { type: number }
                      yan_ratio_fermK: { type: number }
                      yan_ratio_fermO: { type: number }
                      dapGL: { type: number }
                      fkGL: { type: number }
                      foGL: { type: number }
                      dapYan: { type: number }
                      fkYan: { type: number }
                      foYan: { type: number }
                      dapG: { type: number }
                      fkG: { type: number }
                      foG: { type: number }
                      enforce: { type: boolean }
                      debug: { type: string, description: Which internal solve branch was used. }
                      gofermYanContribution: { type: number }
                      sna:
                        type: object
                        properties:
                          nitrogen: { type: number }
                          totalFermO: { type: number }
                          totalFermK: { type: number }
                          totalDAP: { type: number }
                          additions:
                            type: array
                            items:
                              type: object
                              properties:
                                timing:
                                  description: An hour count, or the string "break" for the 1/3 sugar break.
                                  oneOf:
                                    - type: number
                                    - type: string
                                fermO: { type: number }
                                fermK: { type: number }
                                dap: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /build-batch:
    post:
      tags: [Nutrients]
      summary: Build a full recipe (honey, yeast, nutrients) for a target batch
      description: >
        Resolves a target OG/FG/ABV, picks an SNA schedule (or uses `snaScheduleOverride`),
        applies any fruit/grain YAN contribution, computes the honey weight and yeast/Go-Ferm
        requirements, and splits nutrients across whichever `nutrientRegimen` was selected. All
        parameters are optional; defaults match MeadBot's `!build-batch` command. `advanced*`,
        `yanRatio*`, `*Limit`, and `fillFkFirst` are only meaningful when `nutrientRegimen` is
        `advanced`.
      operationId: buildBatch
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                units: { type: string, enum: [us, metric], default: us }
                volume:
                  type: number
                  description: Batch volume, in gallons (us) or liters (metric). Defaults to 5 (us) or 18.9 (metric).
                yeastAbv: { type: number, default: 18, description: The yeast's expected %ABV tolerance. }
                residualSugar:
                  type: number
                  default: 1.02
                  description: Target FG. Ignored if ogOverride is set (re-derived from it instead).
                yanRequirement:
                  type: string
                  enum: [very_low, low, medium, high, kveik]
                  default: medium
                nutrientRegimen:
                  type: string
                  enum: [tosna, k_dap, blount_elliott, tosna_k, o_k, advanced]
                  default: blount_elliott
                ogOverride:
                  type: number
                  nullable: true
                  description: Target OG. If set, overrides residualSugar (re-deriving FG, clamped to a minimum of 1.0).
                pitchRateOverride:
                  type: number
                  nullable: true
                  description: Yeast g/gallon (us) or g/L (metric), overriding the normal Go-Ferm/pitch-rate calculation.
                fruitSg:
                  type: number
                  nullable: true
                  description: Gravity contribution from fruit/grains. Must not exceed the resolved OG.
                yanOverride:
                  type: number
                  nullable: true
                  description: Target total YAN (ppm). Used only for the advanced regimen.
                fermOEffectiveness: { type: number, default: 2.6 }
                enforceLimits: { type: boolean, default: true }
                dapLimit: { type: number, default: 0.96, description: g/L. }
                fermKLimit: { type: number, default: 0.5, description: g/L. }
                fermOLimit: { type: number, default: 0.45, description: g/L. }
                yanRatioDap: { type: number, default: 35 }
                yanRatioFermK: { type: number, default: 25 }
                yanRatioFermO: { type: number, default: 40 }
                fermKYan: { type: number, default: 134, description: ppm YAN provided by the Fermaid K product in use. }
                gofermYan: { type: number, default: 77, description: ppm YAN provided by the Go-Ferm product in use. }
                fillFkFirst: { type: boolean, default: true }
                hot:
                  type: boolean
                  default: false
                  description: Whether fermenting hot (affects the default SNA schedule).
                snaScheduleOverride:
                  type: array
                  nullable: true
                  description: >
                    Explicit SNA schedule, overriding the default derived from yanRequirement/hot/og.
                    Each element is an hour count (1-500), "break", or "pitch" (only as the first element).
                  items:
                    oneOf:
                      - type: number
                      - type: string
                  example: [24, 48, 72, 'break']
      responses:
        '200':
          description: Full recipe.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      volume: { type: number }
                      units: { type: integer }
                      og: { type: number }
                      fg: { type: number }
                      abv: { type: number }
                      yanRequirement: { type: integer }
                      nutrientRegimen: { type: integer }
                      gofermYanContribution: { type: number }
                      fruitPercent: { type: number }
                      fruitPercent100: { type: number }
                      fruitYanContribution: { type: number }
                      honey:
                        type: object
                        properties:
                          weight: { type: number }
                          unit: { type: string, example: lbs }
                      goferm:
                        type: object
                        properties:
                          minGrams: { type: number }
                          numPackets: { type: integer }
                          grams: { type: number }
                          dilutionWaterMl: { type: number }
                      nut:
                        type: object
                        description: The resolved nutrient schedule for the selected regimen.
                        properties:
                          nitrogen: { type: number }
                          totalFermO: { type: number }
                          totalFermK: { type: number }
                          totalDAP: { type: number }
                          additions:
                            type: array
                            items:
                              type: object
                              properties:
                                timing:
                                  oneOf:
                                    - type: number
                                    - type: string
                                fermO: { type: number }
                                fermK: { type: number }
                                dap: { type: number }
                      advancedNutrients:
                        type: object
                        nullable: true
                        description: Present only when nutrientRegimen is advanced; same shape as /calculate-nutrients' response.
                      break3:
                        type: number
                        description: The 1/3 sugar break gravity, used to label the corresponding addition.
        '400':
          $ref: '#/components/responses/Error'

  /calculate-mead:
    post:
      tags: [Nutrients]
      summary: Build a full recipe from a target gravity, volume, and/or ABV
      description: >
        Resolves a target OG/FG/ABV/volume — supply any two of target gravity, target volume, and
        target ABV, and the third is solved for; when both target gravity and target volume are
        given without a full sugar specification (or with one that leaves a sugar's amount
        unspecified), the required sugar quantity is solved for instead. Supports optional step
        feeding (`targetStepFeedGravity`), fruit/other-sugar YAN contribution via
        `additionalSugars`, and Go-Ferm/nutrient-schedule computation. All parameters are
        optional; defaults match MeadBot's `!calculate-mead` command. `additionalSugars` entries'
        `sugarContent`/`yanMultiplier` default to the named sugar source's known values when
        omitted.
      operationId: calculateMead
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                units: { type: string, enum: [us, metric, imperial], default: us }
                mustTemperature:
                  type: number
                  nullable: true
                  description: Defaults to 68 (us/imperial) or 20 (metric).
                mustTemperatureUnits:
                  type: string
                  enum: [celsius, fahrenheit]
                  nullable: true
                  description: Defaults to fahrenheit (us/imperial) or celsius (metric).
                targetGravity:
                  type: number
                  nullable: true
                  description: Defaults to 1.108 when neither targetVolume nor targetAbv resolve it.
                targetGravityUnits: { type: string, enum: [sg, brix, baume], nullable: true, default: sg }
                targetAbv:
                  type: number
                  nullable: true
                  description: Defaults to 14.13 when not resolved from targetGravity/targetStepFeedGravity.
                targetAbvUnits: { type: string, enum: [abv, abw], nullable: true, default: abv }
                targetVolume:
                  type: number
                  nullable: true
                  description: Defaults to 5 (us), 18.93 (metric), or 5 (imperial, in imperial gallons).
                targetVolumeUnits:
                  type: string
                  nullable: true
                  description: >
                    Defaults to gallons_us/liters/gallons_imp matching units. Any name accepted by
                    /volume-units/{name}.
                additionalSugars:
                  type: array
                  nullable: true
                  description: >
                    Additional fruit/sugar sources contributing to gravity and/or YAN. At most one
                    entry may omit quantityAmount (it will be solved for); entries with
                    additive=true must specify quantityAmount.
                  items:
                    type: object
                    required: [type, quantityUnits]
                    properties:
                      type:
                        type: string
                        example: honey
                        description: Sugar source name, e.g. honey, blueberry, dried_apricots.
                      quantityAmount:
                        type: number
                        nullable: true
                        description: Omit to have this sugar's quantity solved for.
                      quantityUnits:
                        type: string
                        example: lbs
                        description: Any name accepted by GET /honey-units/{name}.
                      sugarContent:
                        type: number
                        nullable: true
                        description: Percent sugar by weight. Defaults to the sugar source's known value.
                      yanMultiplier:
                        type: number
                        nullable: true
                        description: Defaults to the sugar source's known value.
                      additive:
                        type: boolean
                        default: false
                        description: If true, this sugar's volume is added on top of targetVolume rather than being part of it.
                currentGravity: { type: number, nullable: true, default: 1.0 }
                currentGravityUnits: { type: string, enum: [sg, brix, baume], nullable: true, default: sg }
                currentVolume: { type: number, nullable: true, default: 0 }
                currentVolumeUnits:
                  type: string
                  nullable: true
                  description: Defaults to gallons_us/liters/gallons_imp matching units.
                targetStepFeedGravity:
                  type: number
                  nullable: true
                  description: >
                    If set, must be greater than the resolved targetGravity; enables step feeding
                    and overrides targetAbv (derived from this value instead).
                yeastAbv: { type: number, default: 18, description: The yeast's expected %ABV tolerance. }
                yanRequirement:
                  type: string
                  enum: [very_low, low, medium, high, kveik]
                  default: medium
                hot:
                  type: boolean
                  default: false
                  description: Whether fermenting hot (affects the default SNA schedule).
                calculateAdditiveHoney:
                  type: boolean
                  default: false
                  description: >
                    When no additionalSugars are given and both targetGravity and targetVolume are
                    specified, solve for how much honey to add on top of targetVolume rather than
                    how much of targetVolume should be honey.
                fermOEffectiveness: { type: number, default: 2.6 }
                enforceLimits: { type: boolean, default: true }
                dapLimit: { type: number, default: 0.96, description: g/L. }
                fermKLimit: { type: number, default: 0.5, description: g/L. }
                fermOLimit: { type: number, default: 0.45, description: g/L. }
                yanRatioDap: { type: number, default: 35 }
                yanRatioFermK: { type: number, default: 25 }
                yanRatioFermO: { type: number, default: 40 }
                fermKYan: { type: number, default: 134, description: ppm YAN provided by the Fermaid K product in use. }
                gofermYan: { type: number, default: 77, description: ppm YAN provided by the Go-Ferm product in use. }
                fillFkFirst: { type: boolean, default: true }
                useGoferm: { type: boolean, default: true }
                yeastPackGrams: { type: number, default: 5 }
      responses:
        '200':
          description: Full recipe.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      mustTemperature: { type: number }
                      mustTemperatureUnits: { type: integer }
                      targetGravity: { type: number }
                      targetGravityUnits: { type: integer }
                      targetStepFeedGravity: { type: number, nullable: true }
                      targetFinalGravity:
                        type: number
                        description: The resolved FG, expressed in targetGravityUnits.
                      targetAbv: { type: number }
                      targetAbvUnits: { type: integer }
                      targetVolume: { type: number }
                      targetVolumeUnits: { type: integer }
                      stepFeeding:
                        type: object
                        nullable: true
                        description: Present only when targetStepFeedGravity was given.
                        properties:
                          volumeAfterSteps: { type: number }
                          honeyVolsPerStep: { type: number }
                          numberOfSteps: { type: integer }
                          stepAddSg: { type: number }
                      currentGravity: { type: number }
                      currentGravityUnits: { type: integer }
                      currentGravitySpecified: { type: boolean }
                      currentVolume: { type: number }
                      currentVolumeUnits: { type: integer }
                      currentVolumeSpecified: { type: boolean }
                      additionalSugars:
                        type: array
                        nullable: true
                        description: >
                          Echoes the request's additionalSugars, with any solved-for
                          quantityAmount filled in.
                        items:
                          type: object
                      goferm:
                        type: object
                        properties:
                          minGrams: { type: number }
                          numPackets: { type: integer }
                          grams: { type: number }
                          dilutionWaterMl: { type: number }
                          yeastPackGrams: { type: number }
                      gofermYanContribution: { type: number }
                      fruitYanContribution: { type: number }
                      nutrients:
                        type: object
                        description: Same shape as /calculate-nutrients' response (minus gofermYanContribution).
                      break3:
                        type: number
                        description: The 1/3 sugar break gravity, used to label the corresponding addition.
        '400':
          $ref: '#/components/responses/Error'

  /sugar-sources/{name}:
    get:
      tags: [Sugar sources]
      summary: Look up a sugar source identifier by name
      operationId: getSugarSourceIdentifier
      parameters:
        - name: name
          in: path
          required: true
          description: Sugar source name, e.g. `honey`, `blueberry`, `dried_apricots`.
          schema:
            type: string
          example: honey
      responses:
        '200':
          description: Sugar source found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      unitId: { type: integer }
                      sugarSource:
                        type: object
                        properties:
                          name: { type: string }
                          percent: { type: number }
                          yan: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /dates/days-between:
    post:
      tags: [Dates]
      summary: Calculate the number of full days between two dates
      operationId: getDaysBetween
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date1, date2]
              properties:
                date1: { type: string, format: date-time, example: '2024-01-01T00:00:00Z' }
                date2: { type: string, format: date-time, example: '2024-01-10T00:00:00Z' }
      responses:
        '200':
          description: Days between the two dates.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      daysBetween: { type: number }
        '400':
          $ref: '#/components/responses/Error'

  /dates/months-between:
    post:
      tags: [Dates]
      summary: Calculate the number of months between two dates
      operationId: getMonthsBetween
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date1, date2]
              properties:
                date1: { type: string, format: date-time, example: '2024-01-01T00:00:00Z' }
                date2: { type: string, format: date-time, example: '2024-03-15T00:00:00Z' }
                roundUpFractionalMonths:
                  type: boolean
                  default: false
                  description: If true, a fractional trailing month rounds up to a full month.
      responses:
        '200':
          description: Months between the two dates.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      monthsBetween: { type: integer }
        '400':
          $ref: '#/components/responses/Error'

  /random:
    get:
      tags: [Misc]
      summary: Generate a random integer in the range [0, max)
      operationId: randomInteger
      parameters:
        - name: max
          in: query
          required: true
          schema:
            type: integer
          example: 10
      responses:
        '200':
          description: Random integer.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      max: { type: integer }
                      value: { type: integer }
        '400':
          $ref: '#/components/responses/Error'

  /hours-string:
    post:
      tags: [Misc]
      summary: Build a human-readable string from SNA timing information
      operationId: makeHoursString
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [timing]
              properties:
                timing:
                  type: string
                  description: >
                    `"pitch"`, `"break"`, an `"hours,additionIndex"` pair (e.g. `"24,1"`), or a
                    plain number of hours (e.g. `"48"`).
                  example: '24,1'
                break3:
                  type: number
                  nullable: true
                  description: The 1/3 sugar break SG. Required only when `timing` is `"break"`.
      responses:
        '200':
          description: Human-readable timing string.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessFlag'
                  - type: object
                    properties:
                      timing: { type: string }
                      hoursString: { type: string }
        '400':
          $ref: '#/components/responses/Error'

components:
  parameters:
    UnitName:
      name: name
      in: path
      required: true
      description: Unit name, e.g. `gallon`, `liters`, `kg`, `lbs`.
      schema:
        type: string
      example: gallon

  schemas:
    SuccessFlag:
      type: object
      properties:
        error:
          type: boolean
          example: false

    UnitInfo:
      type: object
      properties:
        name:
          type: string
          example: Gallon(s) US
        conversion:
          type: number
          description: Multiplier to convert an amount in this unit to the module's base unit.
          example: 3.7854117891

    Error:
      type: object
      properties:
        error:
          type: boolean
          example: true
        errorMessage:
          type: string
          example: 'og nope is not a number.'
        errorArgument:
          type: string
          nullable: true
          example: og
        errorArgumentPosition:
          type: integer
          nullable: true
          example: 0
        errorType:
          type: integer
          nullable: true
          description: '0 = unknown, 1 = isNaN, 2 = range, 3 = invalid arguments.'
          example: 1
        errorTypeLabel:
          type: string
          nullable: true
          example: isNaN

  responses:
    Error:
      description: The request could not be processed (validation failure, out-of-range value, or unknown unit/name).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
