name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run tests
        run: composer test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      # Rebuild vendor/ without dev-only packages (e.g. phpunit) so nothing
      # test-only ships to the server.
      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress --prefer-dist

      # Written at the repo root (outside public/, so it's never web-accessible) and loaded at
      # runtime by src/Http/Env.php. .env is gitignored — this is the only place these secrets
      # reach the server, since the deploy itself is a dumb FTP file sync with no remote shell.
      # Note: this deploy never touches the database itself — apply migrations/*.sql manually
      # against MYSQL_DB_* (see README) before merging a change that needs a new one; CI has no
      # DB access to run them automatically.
      - name: Write server .env
        run: |
          cat > .env <<EOF
          FIREWORKS_API_KEY=${{ secrets.FIREWORKS_API_KEY }}
          CHAT_API_KEY=${{ secrets.CHAT_API_KEY }}
          MYSQL_DB_HOST=${{ secrets.MYSQL_DB_HOST }}
          MYSQL_DB_PORT=${{ secrets.MYSQL_DB_PORT }}
          MYSQL_DB_DATABASE=${{ secrets.MYSQL_DB_DATABASE }}
          MYSQL_DB_USERNAME=${{ secrets.MYSQL_DB_USERNAME }}
          MYSQL_DB_PASSWORD=${{ secrets.MYSQL_DB_PASSWORD }}
          EOF

      - name: Deploy over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            tests/**
            phpunit.xml.dist
